# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: TemplateWorkspace
dist: build/goreleaser-dist

snapshot:
  version_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}-{{ .Timestamp }}"

before:
  hooks:
    - python scripts/package_release.py build-current --version {{ .Version }} --output release-artifacts --clean

builds: []

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256
  extra_files:
    - glob: release-artifacts/**/*.zip

source:
  enabled: false

release:
  extra_files:
    - glob: release-artifacts/**/*.zip
