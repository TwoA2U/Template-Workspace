name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  build-artifacts:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: ubuntu-latest
            label: Linux
          - os: macos-latest
            label: macOS
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "RELEASE_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=snapshot" >> "$GITHUB_ENV"
          fi

      - name: Install packaging dependencies
        run: python -m pip install -r requirements.txt

      - name: Build packaged artifact
        run: python scripts/package_release.py build-current --version "${{ env.RELEASE_VERSION }}" --output release-artifacts --clean

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.label }}
          path: release-artifacts/*.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    if: github.event_name == 'push'
    needs: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TW_SKIP_BUILD: "1"

  snapshot-release:
    name: Build snapshot bundle
    if: github.event_name == 'workflow_dispatch'
    needs: build-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Run GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot
        env:
          TW_SKIP_BUILD: "1"

      - name: Upload combined snapshot artifacts
        uses: actions/upload-artifact@v6
        with:
          name: snapshot-release
          path: release-artifacts/*
          if-no-files-found: error
