name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.vars.outputs.release_version }}
    steps:
      - name: Set release version
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "release_version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "release_version=snapshot-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

  build-artifacts:
    name: Build ${{ matrix.label }}
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: ubuntu-latest
            label: Linux
          - os: macos-latest
            label: macOS
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set release version
        shell: bash
        run: echo "RELEASE_VERSION=${{ needs.prepare-release.outputs.release_version }}" >> "$GITHUB_ENV"

      - name: Install packaging dependencies
        run: python -m pip install -r requirements.txt

      - name: Build packaged artifact
        run: python scripts/package_release.py build-current --version "${{ env.RELEASE_VERSION }}" --output release-artifacts --clean

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.label }}
          path: release-artifacts/*.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    if: github.event_name == 'push'
    needs:
      - prepare-release
      - build-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Write checksums
        run: python scripts/package_release.py write-checksums --version "${{ needs.prepare-release.outputs.release_version }}" --output release-artifacts

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ needs.prepare-release.outputs.release_version }}" release-artifacts/*.zip release-artifacts/*_checksums.txt --title "${{ needs.prepare-release.outputs.release_version }}" --generate-notes

  snapshot-bundle:
    name: Build snapshot bundle
    if: github.event_name == 'workflow_dispatch'
    needs:
      - prepare-release
      - build-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Write checksums
        run: python scripts/package_release.py write-checksums --version "${{ needs.prepare-release.outputs.release_version }}" --output release-artifacts

      - name: Upload combined snapshot artifacts
        uses: actions/upload-artifact@v6
        with:
          name: snapshot-release
          path: release-artifacts/*
          if-no-files-found: error
